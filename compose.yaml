services:
  app:
    build: .
    env_file: .env                 # your keys (satnogs_db_api_key, HUGGING_FACE_HUB_TOKEN, ...) — never baked into the image
    working_dir: /app
    volumes:
      - .:/app                      # live code: edit on host, run in container
      - hf-cache:/root/.cache/huggingface

volumes:
  hf-cache:
